name: Check Results Automatic

on:
  schedule:
    - cron: '*/10 * * * *' # هيشتغل كل ربع ساعة
  workflow_dispatch: # عشان تقدر تشغله بإيدك لو حبيت تختبره

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Libraries
        run: pip install requests beautifulsoup4
        
      - name: Run Script
        run: python script.py
        
      - name: Save new state
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add last_hash.txt
          git commit -m "Update website state" || exit 0
          git push

